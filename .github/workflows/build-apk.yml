name: Build PawPrint Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # ← lets you trigger manually from GitHub UI

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      # ── 1. Checkout code ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js ─────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      # ── 3. Install dependencies ───────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 4. Build React / Vite app ─────────────────────────────
      - name: Build web app
        run: npm run build

      # ── 5. Set up Java 17 (required by Gradle) ────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 6. Set up Android SDK ─────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Install Capacitor CLI + sync ───────────────────────
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── 8. Cache Gradle dependencies (speeds up future builds) ─
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 9. Make gradlew executable ────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # ── 10. Build debug APK (always — no signing needed) ──────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── 11. Build release APK (only if keystore secret exists) ─
      - name: Build release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decode keystore from base64 secret
          echo "$KEYSTORE_BASE64" | base64 --decode > app/pawprint-release.jks

          # Build signed release APK
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/pawprint-release.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      # ── 12. Upload debug APK as artifact ──────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pawprint-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30     # available to download for 30 days

      # ── 13. Upload release APK as artifact (if built) ─────────
      - name: Upload release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: pawprint-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── 14. Print APK info ────────────────────────────────────
      - name: Print build summary
        run: |
          echo "✅ Build complete!"
          echo ""
          echo "Debug APK:"
          ls -lh android/app/build/outputs/apk/debug/ 2>/dev/null || echo "  Not found"
          echo ""
          echo "Release APK:"
          ls -lh android/app/build/outputs/apk/release/ 2>/dev/null || echo "  Not built (no keystore configured)"
          echo ""
          echo "📥 Download from the Actions tab → this run → Artifacts section"
